name: Build to test PR

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install system dependencies
        run: pacman -Syu --noconfirm base-devel git rust
      - uses: actions/checkout@v5
      - name: Build binary
        run: cargo build --release
      - name: Create tarball
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_NAME="x86_64"
          elif [ "$ARCH" = "aarch64" ]; then
            ARCH_NAME="aarch64"
          fi
          mkdir -p crosshair-maker-linux-${ARCH_NAME}
          cp target/release/crosshair-maker crosshair-maker-linux-${ARCH_NAME}/
          cp LICENSE crosshair-maker-linux-${ARCH_NAME}/
          tar -czf crosshair-maker-linux-${ARCH_NAME}.tar.gz -C crosshair-maker-linux-${ARCH_NAME} .
      - name: Generate checksum
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_NAME="x86_64"
          elif [ "$ARCH" = "aarch64" ]; then
            ARCH_NAME="aarch64"
          fi
          sha256sum crosshair-maker-linux-${ARCH_NAME}.tar.gz > crosshair-maker-linux-${ARCH_NAME}.sha256
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: crosshair-maker-linux
          path: |
            crosshair-maker-linux-*.tar.gz
            crosshair-maker-linux-*.sha256
